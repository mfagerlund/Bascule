name: Publish Bascule.RL to NuGet

# Trusted publishing (OIDC → short-lived key) — no stored API key.
# nuget.org policy: Repository Owner = mfagerlund, Repository = Bascule, Workflow File = publish.yml.
# Publish Tensotron first: Bascule.RL depends on Tensotron being on nuget.org to restore.
# Gated on the test job so a broken tag can't ship an immutable package.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test tests/Bascule.RL.Tests/Bascule.RL.Tests.csproj -c Release

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # enable GitHub OIDC token issuance for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive   # Bascule.RL builds against the Tensotron engine submodule
          fetch-depth: 0          # MinVer derives the version from git history + tags

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack src/Bascule.RL/Bascule.RL.csproj -c Release -o artifacts

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: mfagerlund   # nuget.org profile name (not email)

      - name: Push
        run: dotnet nuget push "artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
