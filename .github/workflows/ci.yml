name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive   # Bascule.RL builds against the Tensotron engine submodule
          fetch-depth: 0          # MinVer derives the version from git history + tags

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'

      - name: Test (Godot-free RL core)
        run: dotnet test tests/Bascule.RL.Tests/Bascule.RL.Tests.csproj -c Release

      - name: Pack (verify the NuGet package builds)
        run: dotnet pack src/Bascule.RL/Bascule.RL.csproj -c Release
